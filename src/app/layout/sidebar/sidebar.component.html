<aside class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <mat-icon fontSet="material-icons-outlined">inventory_2</mat-icon>
      </div>
      <div class="brand-text">
        <div class="brand-title">Smart Inventory</div>
        <div class="brand-subtitle">Inventory management system</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav" aria-label="Primary">
    @for (item of items(); track item.link) {
      <a
        class="nav-item"
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.link === '/dashboard' }"
        #rla="routerLinkActive"
        [attr.aria-current]="rla.isActive ? 'page' : null"
      >
        <mat-icon class="nav-icon" fontSet="material-icons-outlined" aria-hidden="true">{{ item.icon }}</mat-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <span class="sidebar-version">{{ version }}</span>
  </div>
</aside>
